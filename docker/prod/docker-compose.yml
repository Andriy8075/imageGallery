version: "3.8"
networks:
    application:
        driver: bridge

services:
    db:
        image: mysql:8.0.44-bookworm
        volumes:
            - ./data:/var/lib/mysql
        env_file:
            - ../../.env
        networks:
            - application
        container_name: mysqldb
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1",
                ]
            interval: 5s
            timeout: 5s
            retries: 30
        restart: unless-stopped

    app:
        build:
            context: ../..
            dockerfile: docker/prod/Dockerfile
        container_name: backend
        ports:
            - "80:8000"
        volumes:
            - ../../storage/app/public:/var/www/storage/app/public
        env_file:
            - ../../.env
        environment:
            DB_HOST: db
        command: ["sh", "/var/www/docker/prod/entrypoint.sh"]
        depends_on:
            db:
                condition: service_healthy
        networks:
            - application
        restart: unless-stopped
