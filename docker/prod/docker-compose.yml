version: "3.8"
networks:
    application:
        driver: bridge

services:
    db:
        image: mysql:8.0.44-bookworm
        ports:
            - "3306:3306"
        volumes:
            - ./data:/var/lib/mysql
        environment:
            - MYSQL_ROOT_PASSWORD=root
            - MYSQL_DATABASE=laravel
            - MYSQL_USER=laravel
            - MYSQL_PASSWORD=secret
        networks:
            - application
        container_name: mysqldb
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
            interval: 5s
            timeout: 5s
            retries: 30
        restart: unless-stopped

    app:
        build:
            context: ../..
            dockerfile: docker/prod/Dockerfile
        container_name: backend
        ports:
            - "8000:8000"
        volumes:
            - ../../storage/app/public:/var/www/storage/app/public
        environment:
            - DB_CONNECTION=mysql
            - DB_HOST=db
            - DB_PORT=3306
            - DB_DATABASE=laravel
            - DB_USERNAME=laravel
            - DB_PASSWORD=secret
        command: ["sh", "/var/www/docker/prod/entrypoint.sh"]
        depends_on:
            db:
                condition: service_healthy
        networks:
            - application
        restart: unless-stopped
