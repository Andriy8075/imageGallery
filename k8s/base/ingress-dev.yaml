apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: image-gallery
  namespace: imagegallery-dev
spec:
  ingressClassName: nginx
  rules:
    - host: imagegallery-dev.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: image-gallery
                port:
                  number: 80
