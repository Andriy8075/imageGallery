# Example secrets — copy per environment, replace placeholders, apply with:
#   kubectl apply -f secret-dev.yaml -n imagegallery-dev
#   kubectl apply -f secret-prod.yaml -n imagegallery-prod
#
# GitHub Actions (repository Secrets):
#   KUBE_CONFIG_DEV  — base64-encoded kubeconfig for the cluster/context that should deploy to dev
#   KUBE_CONFIG_PROD — base64-encoded kubeconfig for prod (can be same cluster, different RBAC)
#
# Generate APP_KEY: php artisan key:generate --show
# Encode kubeconfig: base64 -w0 ~/.kube/config   (GNU/Linux) or [Convert]::ToBase64String on Windows
#
# Private GHCR: kubectl create secret docker-registry ghcr-pull \
#   --docker-server=ghcr.io --docker-username=YOUR_GH_USER --docker-password=GITHUB_PAT -n imagegallery-dev
# then set imagePullSecrets on the Deployment (see deployment-dev.yaml).
#
---
apiVersion: v1
kind: Secret
metadata:
  name: mysql-credentials
  namespace: imagegallery-dev
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: "change-me-root"
  MYSQL_DATABASE: "imageGallery"
---
apiVersion: v1
kind: Secret
metadata:
  name: laravel-env
  namespace: imagegallery-dev
type: Opaque
stringData:
  APP_NAME: "ImageGallery"
  APP_ENV: "production"
  APP_DEBUG: "false"
  APP_KEY: "base64:GENERATE_WITH_php_artisan_key_generate"
  APP_URL: "http://imagegallery-dev.local"
  LOG_CHANNEL: "stack"
  LOG_LEVEL: "warning"
  DB_CONNECTION: "mysql"
  DB_HOST: "mysql"
  DB_PORT: "3306"
  DB_DATABASE: "imageGallery"
  DB_USERNAME: "root"
  DB_PASSWORD: "change-me-root"
  SESSION_DRIVER: "file"
  CACHE_STORE: "file"
  QUEUE_CONNECTION: "sync"
---
apiVersion: v1
kind: Secret
metadata:
  name: mysql-credentials
  namespace: imagegallery-prod
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: "change-me-root-prod"
  MYSQL_DATABASE: "imageGallery"
---
apiVersion: v1
kind: Secret
metadata:
  name: laravel-env
  namespace: imagegallery-prod
type: Opaque
stringData:
  APP_NAME: "ImageGallery"
  APP_ENV: "production"
  APP_DEBUG: "false"
  APP_KEY: "base64:GENERATE_WITH_php_artisan_key_generate"
  APP_URL: "http://imagegallery-prod.local"
  LOG_CHANNEL: "stack"
  LOG_LEVEL: "warning"
  DB_CONNECTION: "mysql"
  DB_HOST: "mysql"
  DB_PORT: "3306"
  DB_DATABASE: "imageGallery"
  DB_USERNAME: "root"
  DB_PASSWORD: "change-me-root-prod"
  SESSION_DRIVER: "file"
  CACHE_STORE: "file"
  QUEUE_CONNECTION: "sync"
