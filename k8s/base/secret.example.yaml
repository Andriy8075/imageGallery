apiVersion: v1
kind: Secret
metadata:
  name: mysql-credentials
  namespace: imagegallery-dev
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: "change-me-root"
  MYSQL_DATABASE: "imageGallery"
---
apiVersion: v1
kind: Secret
metadata:
  name: laravel-env
  namespace: imagegallery-dev
type: Opaque
stringData:
  APP_NAME: "ImageGallery"
  APP_ENV: "production"
  APP_DEBUG: "false"
  APP_KEY: "base64:GENERATE_WITH_php_artisan_key_generate"
  APP_URL: "http://imagegallery-dev.local"
  LOG_CHANNEL: "stack"
  LOG_LEVEL: "warning"
  DB_CONNECTION: "mysql"
  DB_HOST: "mysql"
  DB_PORT: "3306"
  DB_DATABASE: "imageGallery"
  DB_USERNAME: "root"
  DB_PASSWORD: "change-me-root"
  SESSION_DRIVER: "file"
  CACHE_STORE: "file"
  QUEUE_CONNECTION: "sync"
---
